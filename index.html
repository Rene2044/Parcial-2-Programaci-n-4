<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Tu Clima al Instante</title>
    
    <link rel="icon" type="image/png" href="assets/Cap.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="js/Estilos.css">
<body class="weather-bg flex flex-col items-center min-h-screen p-0 m-0 w-full overflow-x-hidden"></body>
    <head>

    <div id="navbar-app" class="w-full"></div>

    <main class="flex-grow max-w-md w-full bg-white/20 backdrop-blur-lg rounded-3xl shadow-2xl p-6 border border-white/30 text-white mt-28 mb-12 transition-all duration-500">
        
        <div class="relative mb-8">
            <input type="text" id="city-input" placeholder="Buscar ciudad..." 
                class="w-full bg-white/20 border-none rounded-2xl py-3 px-5 text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all">
            <button class="absolute right-3 top-2.5 hover:scale-110 active:scale-95 transition" id="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </button>
        </div>

        <div class="text-center mb-10">
            <h1 class="text-3xl font-semibold tracking-tight" id="city-name">Cargando...</h1>
            <p class="text-lg opacity-80" id="current-date">--</p>
            
            <div class="flex justify-center items-center my-6">
                <img src="https://openweathermap.org/img/wn/10d@4x.png" alt="Icono Clima" class="w-32 drop-shadow-lg" id="weather-icon">
                <span class="text-7xl font-light ml-2" id="temperature">--°</span>
            </div>
            
            <p class="text-2xl font-medium" id="weather-desc">--</p>
        </div>

        <div class="grid grid-cols-3 gap-4 text-center bg-black/10 rounded-2xl p-4 mb-8">
            <div class="flex flex-col">
                <p class="text-[10px] uppercase tracking-widest opacity-60 mb-1">Humedad</p>
                <p class="font-semibold text-lg" id="humidity">--</p>
            </div>
            <div class="flex flex-col border-x border-white/10">
                <p class="text-[10px] uppercase tracking-widest opacity-60 mb-1">Viento</p>
                <p class="font-semibold text-lg" id="wind-speed">--</p>
            </div>
            <div class="flex flex-col">
                <p class="text-[10px] uppercase tracking-widest opacity-60 mb-1">Visibilidad</p>
                <p class="font-semibold text-lg" id="visibility">--</p>
            </div>
        </div>

        <div>
            <h3 class="text-xs font-semibold uppercase tracking-widest mb-4 opacity-70">Pronóstico 5 días</h3>
            <div class="flex justify-between overflow-x-auto gap-4 pb-2 custom-scrollbar" id="forecast-container">
                </div>
        </div>
    </main>

    <div id="footer-app" class="w-full"></div>

    <script type="module" src="js/Navbar.js"></script>
    <script type="module" src="js/weatherService.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/Footer.js"></script>
</body>
</html>
